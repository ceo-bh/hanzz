<!DOCTYPE html>
<html>
<head>
<title>ELVANDER STORE</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
*{
font-family:Arial;
box-sizing:border-box;
}

body{
margin:0;
background:#050505;
color:white;
overflow-x:hidden;
}


/* loading */
.loading{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:10;
animation:hapus 3s forwards;
}

.loading h1{
color:#00ff99;
animation:zoom 1s infinite alternate;
}

@keyframes hapus{
0%,80%{opacity:1}
100%{
opacity:0;
visibility:hidden;
}
}

@keyframes zoom{
from{transform:scale(1)}
to{transform:scale(1.2)}
}


/* background */
body:before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#00ff9930,transparent);
animation:putar 8s linear infinite;
z-index:-1;
}

@keyframes putar{
100%{
transform:rotate(360deg);
}
}


header{
text-align:center;
padding:40px;
animation:turun 1s;
}

@keyframes turun{
from{
opacity:0;
transform:translateY(-50px);
}
}


.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
padding:20px;
}


.card{
background:#111;
width:280px;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px black;
transition:.4s;
animation:muncul 1s;
}


@keyframes muncul{
from{
opacity:0;
transform:scale(.5);
}
}


.card:hover{
transform:translateY(-15px);
box-shadow:0 0 30px #00ff99;
}


.card img{
width:100%;
height:170px;
object-fit:cover;
border-radius:15px;
}


h2{
color:#00ff99;
}


button{
width:100%;
padding:12px;
border:0;
border-radius:15px;
background:#00ff99;
font-weight:bold;
cursor:pointer;
}


button:hover{
transform:scale(1.1);
background:white;
}

</style>

</head>


<body>


<div class="loading">
<h1>🚀 ELVANDER STORE</h1>
</div>


<audio autoplay loop>
<source src="musik.mp3">
</audio>


<header>
<h1>🔥 ELVANDER STORE</h1>
<p>Jual Panel & SC Bot WhatsApp</p>
</header>



<div class="container">


<div class="card">

<img src="panel.jpg">

<h2>Panel 2GB</h2>

<p>
Server Stabil<br>
CPU 100%<br>
Support Bot
</p>

<h2>Rp10.000</h2>

<button onclick="order('Panel 2GB')">
BELI
</button>

</div>



<div class="card">

<img src="vps.jpg">

<h2>VPS Premium</h2>

<p>
RAM Besar<br>
Performa Tinggi
</p>

<h2>Rp50.000</h2>

<button onclick="order('VPS Premium')">
BELI
</button>

</div>



<div class="card">

<img src="botwa.jpg">

<h2>SC Bot WhatsApp</h2>

<p>
Menu Bot<br>
Auto Reply<br>
Fitur Lengkap
</p>

<h2>Rp75.000</h2>

<button onclick="order('SC Bot WhatsApp')">
BELI
</button>

</div>


</div>



<script>

function order(nama){

let nomor="628xxxxxxxxxx";

let pesan=
"Halo saya ingin membeli "+nama;

window.open(
"https://wa.me/"+nomor+"?text="+pesan
);

}

</script>


</body>
</html>
